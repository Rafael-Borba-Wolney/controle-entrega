<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Mercadoria</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>Menu</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/enderecos">Endereços</a>
        <a href="/mercadorias">Mercadorias</a>
        <a href="/logout">Sair</a>
    </aside>

    <main class="content">
        <h1>Cadastrar Mercadoria</h1>

        <form th:action="@{/mercadorias/salvar}" th:object="${mercadoria}" method="post" class="form-box">
            <label>Nome</label>
            <input type="text" th:field="*{nome}" required>

            <label>Descrição</label>
            <input type="text" th:field="*{descricao}" required>

            <label>Quantidade</label>
            <input type="number" th:field="*{quantidade}" required>

            <label>Valor</label>
            <input type="number" step="0.01" th:field="*{valor}" required>

            <label>Categoria</label>
            <input type="text" th:field="*{categoria}" required>

            <label>Endereço da Entrega</label>
            <select name="enderecoId" required>
                <option value="">Selecione um endereço</option>
                <option th:each="endereco : ${enderecos}"
                        th:value="${endereco.id}"
                        th:text="${endereco.logradouro + ', ' + endereco.numero + ' - ' + endereco.cidade}">
                </option>
            </select>

            <button type="submit">Salvar</button>
        </form>
    </main>
</div>

</body>
</html>
