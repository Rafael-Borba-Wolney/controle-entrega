<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Endereço</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>Menu</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/enderecos">Endereços</a>
        <a href="/mercadorias">Mercadorias</a>
        <a href="/logout">Sair</a>
    </aside>

    <main class="content">
        <h1>Cadastrar Endereço</h1>

        <form th:action="@{/enderecos/salvar}" th:object="${endereco}" method="post" class="form-box">
            <label>Logradouro</label>
            <input type="text" th:field="*{logradouro}" required>

            <label>Complemento</label>
            <input type="text" th:field="*{complemento}">

            <label>Número</label>
            <input type="text" th:field="*{numero}" required>

            <label>CEP</label>
            <input type="text" th:field="*{cep}" required>

            <label>Cidade</label>
            <input type="text" th:field="*{cidade}" required>

            <label>Estado</label>
            <input type="text" th:field="*{estado}" maxlength="2" required>

            <button type="submit">Salvar</button>
        </form>
    </main>
</div>

</body>
</html>
