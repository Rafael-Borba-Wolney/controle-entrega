<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Endereços</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>Menu</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/enderecos">Endereços</a>
        <a href="/mercadorias">Mercadorias</a>
        <a href="/logout">Sair</a>
    </aside>

    <main class="content">
        <div class="topo-pagina">
            <h1>Endereços Cadastrados</h1>
            <a href="/enderecos/novo" class="botao-link">Novo Endereço</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Logradouro</th>
                    <th>Complemento</th>
                    <th>Número</th>
                    <th>CEP</th>
                    <th>Cidade</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="endereco : ${enderecos}">
                    <td th:text="${endereco.id}"></td>
                    <td th:text="${endereco.logradouro}"></td>
                    <td th:text="${endereco.complemento}"></td>
                    <td th:text="${endereco.numero}"></td>
                    <td th:text="${endereco.cep}"></td>
                    <td th:text="${endereco.cidade}"></td>
                    <td th:text="${endereco.estado}"></td>
                </tr>
            </tbody>
        </table>
    </main>
</div>

</body>
</html>
